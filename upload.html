<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Upload Bukti Bayar Bioskop XIX - Unggah bukti pembayaran tiket bioskop Anda.">
  <title>Bioskop XIX - Upload Bukti Bayar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="navbar-brand">BIOSKOP <span>XIX</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Beranda</a></li>
      <li><a href="registrasi.html">Registrasi Tiket</a></li>
      <li><a href="upload.html" class="active">Upload Bukti Bayar</a></li>
    </ul>
  </nav>

  <div class="upload-container" id="upload">
    <h2>Upload Bukti Bayar</h2>

    <a href="index.html" class="back-link">&#8592; Kembali ke Beranda</a>

    <form id="form-upload" onsubmit="return handleUpload(event)">
      <div class="form-card" style="margin-bottom: 30px;">
        <div class="form-group">
          <label for="nama-upload">Nama Lengkap:</label>
          <input type="text" id="nama-upload" name="nama" placeholder="Masukkan nama lengkap" required>
        </div>

        <div class="form-group">
          <label for="kode-film">Kode Film:</label>
          <input type="text" id="kode-film" name="kode_film" placeholder="Masukkan kode film dari WA">
        </div>

        <div class="form-group">
          <label for="nomor-wa">Nomor WhatsApp:</label>
          <input type="tel" id="nomor-wa" name="nomor_wa" placeholder="Contoh: 089533691754">
        </div>
      </div>

      <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        <div class="icon">📁</div>
        <p><strong>Klik di sini</strong> atau seret file bukti pembayaran Anda</p>
        <p style="font-size:0.8rem; color:#888; margin-top:8px;">Format: JPG, PNG, PDF (Maks. 5MB)</p>
        <input type="file" id="file-input" name="bukti_bayar" accept="image/*,.pdf" style="display:none;" onchange="showFileName(this)">
        <p id="file-name" style="color: #d4a843; margin-top: 12px; font-weight: 600;"></p>
      </div>

      <button type="submit" class="btn-upload" id="btn-upload">Upload Bukti Bayar</button>
    </form>
  </div>

  <!-- FOOTER -->
  <footer class="footer" id="footer">
    <p>Semoga Anda Puas Dengan Layanan Kami</p>
    <p class="sub">&copy; 2025 Bioskop XIX &mdash; All Rights Reserved</p>
  </footer>

  <script>
    function showFileName(input) {
      var fileName = document.getElementById('file-name');
      if (input.files && input.files[0]) {
        fileName.textContent = '✅ File dipilih: ' + input.files[0].name;
      }
    }

    function handleUpload(event) {
      event.preventDefault();
      var fileInput = document.getElementById('file-input');
      if (!fileInput.files || fileInput.files.length === 0) {
        alert('Silahkan pilih file bukti pembayaran terlebih dahulu!');
        return false;
      }
      alert('Bukti pembayaran berhasil diupload!\nTerima kasih, kami akan memverifikasi pembayaran Anda.');
      return false;
    }
  </script>
</body>
</html>
